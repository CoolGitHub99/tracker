name: Polymarket Whale Tracker

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: polymarket-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NUM_TRADERS: '200'
          BIG_TRADE_THRESHOLD: '50000'
          CONSENSUS_MIN_TRADERS: '5'
          CONSENSUS_WINDOW_HOURS: '6'
          CONSENSUS_COOLDOWN_HOURS: '12'
        run: python track.py

      - name: Save tracker's memory
        run: |
          git config user.name "polymarket-tracker-bot"
          git config user.email "actions@github.com"
          git add state/
          git commit -m "Update tracker state [skip ci]" || echo "Nothing new to save"
          git pull --rebase origin main || true
          git push
